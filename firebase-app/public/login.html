<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIA - Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: white; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); text-align: center; }
    .login-logo { font-size: 2.5em; margin-bottom: 8px; }
    .login-title { font-size: 1.5em; font-weight: 700; color: #1a237e; margin-bottom: 4px; }
    .login-sub { font-size: 0.88em; color: #888; margin-bottom: 36px; }
    .btn-google { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 13px 20px; background: white; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 0.95em; font-weight: 600; color: #333; cursor: pointer; transition: all 0.2s; }
    .btn-google:hover { border-color: #1a237e; background: #f8f9ff; box-shadow: 0 2px 8px rgba(26,35,126,0.1); }
    .btn-google svg { flex-shrink: 0; }
    .login-footer { margin-top: 28px; font-size: 0.78em; color: #bbb; }
    .login-error { background: #ffebee; color: #c62828; border-radius: 8px; padding: 10px 16px; font-size: 0.85em; margin-bottom: 20px; display: none; }
    .login-loading { color: #888; font-size: 0.88em; margin-top: 16px; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">📋</div>
    <div class="login-title">BIA</div>
    <div class="login-sub">Business Impact Analysis · Fortes Tecnologia</div>
    <div class="login-error" id="loginError"></div>
    <button class="btn-google" onclick="fazerLogin()">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Entrar com Google
    </button>
    <div class="login-loading" id="loginLoading">⏳ Autenticando...</div>
    <div class="login-footer">Acesso restrito a contas @fortestecnologia.com.br</div>
  </div>

  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    firebase.initializeApp(FIREBASE_CONFIG);
    const auth = firebase.auth();
    const DOMINIO = 'fortestecnologia.com.br';

    // Se já está logado, redireciona
    auth.onAuthStateChanged(user => {
      if (user && user.email.endsWith('@' + DOMINIO)) {
        window.location.href = '/';
      }
    });

    async function fazerLogin() {
      const errorEl = document.getElementById('loginError');
      const loadingEl = document.getElementById('loginLoading');
      errorEl.style.display = 'none';
      loadingEl.style.display = 'block';
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ hd: DOMINIO });
        const result = await auth.signInWithPopup(provider);
        if (!result.user.email.endsWith('@' + DOMINIO)) {
          await auth.signOut();
          throw new Error('Acesso permitido apenas para contas @' + DOMINIO);
        }
        window.location.href = '/';
      } catch(err) {
        loadingEl.style.display = 'none';
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
